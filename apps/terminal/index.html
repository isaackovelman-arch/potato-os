<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; padding: 20px; font-family: monospace; background: #1a1a1a; color: #00ff00; }
    #output { height: 400px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="output">Welcome to AnuraOS Advanced Terminal!</div>
  <input type="text" id="cmd" placeholder="Enter command..." style="width: 100%; padding: 10px; margin-top: 10px; background: #333; color: #fff; border: none;">
  <script>
    document.getElementById('cmd').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('output').innerHTML += 
          `<div>> ${e.target.value}</div>`;
        e.target.value = '';
      }
    });
  </script>
</body>
</html>
